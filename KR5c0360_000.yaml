front:
  text: 御製真武廟碑
  hash: sha256:80ea6ca1be11e726dd5317d5b75a43751c9241631352d3ff71d9bd0c0c35ef3e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0360_HFL_000-001a, image: hfl/0608/0608-100.png}
body:
  text: 朕惟凡有功德於國者無間於幽冥必有酬報之典天人之際理一無二惟北極玄天上帝真武之神其有功德於我國家者大矣昔朕皇考太祖髙皇帝乘運龍飛平定天下雖文武之臣克協謀住實神有以相之肆朕肅靖內難雖亦文武不二心之臣疏附先後奔走禦侮而神之隂翊默贊掌握樞機斡運洪化擊電鞭霆風驅雲駛陟降左右流動揮霍濯濯洋洋繽繽紛紛翕歘恍惚迹尤顯著神用天休莫能紀極今夫臣鄰之功揆厥上下凡近易見故報之亦易若夫神之宏功偉烈行乎天地統乎隂陽充周普遍幽深玄遠窈乎莫測浩乎難窮而報之為實難不有為永久之圖則亦無以稱朕之心焉嘗以武當山神之修真凝道超舉升化之地巳命創建宫觀永永祀神上以資薦皇考皇妣在天之靈下為天下生靈祈豐年綏福履自經始至于告成之日神顯靈應嘉生屢臻異覩殊觀千態萬狀言難鏧述筆莫殫紀雖有善巧者亦莫能形容其倣佛也稽諸載籍曠乎前聞夫以神之昭貺於朕者又若此抑朕復何以為神之報哉其不尤難矣乎顧惟址京天下之都會乃神常翊相豫於艱難之地其可無廟宇為神攸樓與臣民祝祈倚庇之所遂差吉創建崇殿修廡締搆維新亢爽髙明規模弘邃神靈感孚來遊來止星麾飊馭飄颻旖旎儼然視瞻歲時蠲潔以虔祀事庶幾朝夕神保無斁雖然神之佑相於朕者固不係乎報不報而朕心之拳拳不巳者故無所用其至惟盡其誠而巳然則神之為貺亦豈啻北而止覆而為雲澤而為雨鼓之為雷霆明之為日月驅祅殄沴無水旱札瘥以生夫萬物者其癊庇於吾民又豈有窮乎於是為文以記之并系以詩白先天始氣五靈君玄老太隂實化成察微知遠生神靈修真內錬心志寧濳契太虛感玉清功滿道備乘龍行歸根復位以顯名天地悠久日月并神昭功德翊我明手握化機佐運興武當育秀何崢嶸琳宫仙館敞瑶瓊用報神貺表孝情神敷嘉錫備休徴翼翼寢廟建址京人徼貺兮神幪帡晨鍾暮鼓聲鏗鍧神之來兮風泠泠駕飛龍兮驅流星飄翠蓋兮翳霓旌八鸞九鳳先後迎倏而來兮急而升劔光吐納隂陽精焱為電兮擊為霆陶鑄萬彚無留停祥風甘雨宣和平髙冝黍兮下冝杭祛祅蕩札民物亨清酤進兮肴核馨報萬祀兮毖一誠永樂十三年八月十三日
