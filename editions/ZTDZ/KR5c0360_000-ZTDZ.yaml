front:
  text: 御製眞武廟碑
  hash: sha256:a9b55f79a0ba1185f30f4632b0c141528eaf9d7a68f61f8661ab7aaf64677797
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0360_SJB_000-190640b, image: sjb/19/190640b.png}
body:
  text: 朕惟凡有功德於國者無間於幽冥必有酬報之典天人之際理一無二惟北極玄天上帝眞武之神其有功德於我國家者大矣昔朕皇考太祖髙皇帝乗運龍飛平定天下雖文武之臣克恊謀住實神有以相之肆朕肅靖内難雖亦文武不二心之臣疏附先後奔走禦侮而神之隂翊黙賛掌握樞機斡運洪化擊電鞭霆風驅雲駛陟降左右流動揮霍濯濯洋洋繽繽紛紛翕歘恍惚迹尤顯著神用天休莫能紀極今夫臣鄰之功揆厥上下凡近易見故報之亦易若夫神之宏功偉烈行乎天地統乎隂陽充周普遍幽深玄遠窈乎莫測浩乎難窮而報之爲實難不有爲永久之圖則亦無以稱朕之心焉甞以武當山神之修眞凝道超舉升化之地巳命創建宫觀永永祀神上以資薦皇考皇妣在天之靈下爲天下生靈祈豐年綏福履自經始至于吿成之日神顯靈應嘉生屢臻異覩殊觀千態萬狀言難鏧述筆莫殫紀雖有善巧者亦莫能形容其彷彿也稽諸載籍曠乎前聞夫以神之昭貺於朕者又若此抑朕復何以爲神之報哉其不尤難矣乎顧惟址京天下之都會乃神常翊相予於艱難之地其可無廟宇爲神攸樓與臣民祝祈𠋣庇之所遂差吉創建崇殿脩廡締搆維新亢爽髙明䂓模弘䆳神靈感孚來遊來止星麾飊馭飄颻旖旎儼然視瞻歳時蠲潔以䖍祀事庶幾朝夕神保無斁雖然神之佑相於朕者固不係乎報不報而朕心之拳拳不巳者故無所用其至惟盡其誠而巳然則神之爲貺亦豈啻北而止覆而爲雲澤而爲雨鼔之爲雷霆明之爲日月驅祅殄沴無水旱札瘥以生夫萬物者其癊庇於吾民又豈有窮乎於是爲文以記之并系以詩白先天始氣五靈君玄老太隂實化成察微知遠生神靈修眞内錬心志寧濳契太虛感玉清功满道備乗龍行歸根復位以顯名天地悠久日月并神昭功德翊我明手握化機佐運興武當毓秀何崢嶸琳宫仙舘敞瑶瓊用報神貺表孝情神敷嘉錫備休徴翼翼寢廟建址京人徼貺兮神幪帡晨鍾暮鼓聲鏗鍧神之來兮風泠泠駕飛龍兮驅流星飄翠蓋兮翳霓旌八鸞九鳳先後迎倏而來兮急而升劔光吐納隂陽精焱爲電兮擊爲霆陶鑄萬彚無留停祥風甘雨宣和平髙冝黍兮下冝杭祛祅蕩札民物亨清酤進兮肴核馨報萬祀兮毖一誠永樂十三年八月十三日
